services:
  - type: web
    name: mi-laravel-app
    env: docker
    buildCommand: |
      composer install --no-dev
      php artisan key:generate
      php artisan storage:link
      php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false
